name: Generate Contribution Snake

on:
  schedule:
    # Refresh the animation every 6 hours.
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Generate cute developer contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: Daiivr
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ffb3c6&color_dots=#161b22,#2a2138,#6f4aa0,#cdb4db,#bde0fe
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ffb3c6&color_dots=#161b22,#241b31,#6f4aa0,#cdb4db,#bde0fe
            dist/github-contribution-grid-snake.gif?color_snake=#ffb3c6&color_dots=#161b22,#241b31,#6f4aa0,#cdb4db,#bde0fe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish generated files
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: update contribution animations"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
