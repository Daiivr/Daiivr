name: Generate Pac-Man Contribution Graph

on:
  schedule:
    # Refresh the arcade graph every 6 hours.
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pacman-contribution-graph
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Generate Pac-Man contribution graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Daiivr
          github_token: ${{ secrets.GITHUB_TOKEN }}
          games: pacman
          player_style: opportunistic

      - name: Verify generated files
        run: |
          test -s dist/pacman-contribution-graph.svg
          test -s dist/pacman-contribution-graph-dark.svg
          ls -lh dist

      - name: Publish generated files
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: refresh pac-man contribution graph"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
